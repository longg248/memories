<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍜 Ăn cùng người mình thương</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Nunito:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <style>
    :root {
      --cream:#FFF8F3; --rose:#FFB5C8; --rose-d:#FF8FAB;
      --peach:#FFD0B7; --yellow:#FFE8B6; --text:#4A3728;
      --text-lt:#9B8B82;
      --sh:0 4px 24px rgba(255,140,140,.13);
      --sh-h:0 8px 32px rgba(255,140,140,.24);
      --r:20px; --rs:12px;
      --fd:'Playfair Display',serif; --fb:'Nunito',sans-serif;
      --tr:all .3s cubic-bezier(.4,0,.2,1);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      font-family:var(--fb);background:var(--cream);color:var(--text);min-height:100vh;
      background-image:
        radial-gradient(circle at 15% 15%,rgba(255,181,200,.28) 0%,transparent 55%),
        radial-gradient(circle at 85% 85%,rgba(255,208,183,.28) 0%,transparent 55%);
    }

    /* ── HEADER ── */
    .header{
      background:#fff;padding:.875rem 1.5rem;
      display:flex;align-items:center;justify-content:space-between;
      box-shadow:0 2px 16px rgba(255,140,140,.1);
      position:sticky;top:0;z-index:100;
    }
    .header-logo{font-family:var(--fd);font-size:1.15rem;color:var(--text);}
    .header-nav{display:flex;gap:.25rem;}
    .nav-btn{
      background:none;border:none;padding:.45rem .875rem;border-radius:var(--rs);cursor:pointer;
      font-family:var(--fb);font-size:.85rem;font-weight:700;color:var(--text-lt);transition:var(--tr);
    }
    .nav-btn:hover{background:var(--cream);color:var(--text);}
    .nav-btn.active{color:var(--rose-d);background:rgba(255,144,171,.1);}

    /* ── BOTTOM NAV ── */
    .btm-nav{
      position:fixed;bottom:0;left:0;right:0;background:#fff;padding:.6rem;
      display:flex;justify-content:space-around;
      box-shadow:0 -4px 20px rgba(255,140,140,.1);z-index:100;
    }
    .btm-btn{
      display:flex;flex-direction:column;align-items:center;gap:.2rem;
      background:none;border:none;cursor:pointer;font-family:var(--fb);
      font-size:.68rem;font-weight:700;color:var(--text-lt);transition:var(--tr);
      padding:.25rem .875rem;border-radius:var(--rs);
    }
    .btm-btn>span:first-child{font-size:1.35rem;}
    .btm-btn.active{color:var(--rose-d);}
    .btm-btn.add-btn-c>span:first-child{
      background:linear-gradient(135deg,var(--rose),var(--peach));
      color:#fff;border-radius:50%;width:2.5rem;height:2.5rem;
      display:flex;align-items:center;justify-content:center;
      font-size:1.4rem;box-shadow:var(--sh);
    }

    /* ── PAGES ── */
    .page{display:none;padding:1.5rem 1rem 6rem;max-width:720px;margin:0 auto;}
    .page.active{display:block;}

    /* ── TEXT ── */
    .pg-title{font-family:var(--fd);font-size:1.6rem;margin-bottom:1.5rem;line-height:1.2;}
    .pg-title span{font-style:italic;color:var(--rose-d);}
    .sec-label{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-lt);margin-bottom:.875rem;}
    .info-box{background:var(--yellow);border-radius:var(--rs);padding:.75rem 1rem;margin-bottom:1.25rem;font-size:.83rem;}
    .info-box strong{display:block;margin-bottom:.2rem;}

    /* ── HOME ── */
    .suggest-box{
      background:linear-gradient(135deg,#fff 0%,var(--yellow) 100%);
      border-radius:var(--r);padding:1.25rem 1.5rem;margin-bottom:2rem;
      box-shadow:var(--sh);position:relative;overflow:hidden;
    }
    .suggest-box::after{content:'✨';position:absolute;right:1.25rem;top:.875rem;font-size:2.2rem;opacity:.4;}
    .suggest-lbl{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--text-lt);margin-bottom:.4rem;}
    .suggest-ttl{font-family:var(--fd);font-size:1.05rem;margin-bottom:.875rem;}
    .chips{display:flex;flex-wrap:wrap;gap:.5rem;}
    .chip{
      background:#fff;border-radius:20px;padding:.35rem .875rem;
      font-size:.83rem;font-weight:700;color:var(--text);
      box-shadow:0 2px 8px rgba(0,0,0,.07);cursor:pointer;transition:var(--tr);border:none;
    }
    .chip:hover{background:var(--rose);color:#fff;}

    .cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.875rem;}
    .cat-card{
      border-radius:var(--r);padding:1.5rem 1rem;box-shadow:var(--sh);
      cursor:pointer;transition:var(--tr);text-align:center;border:2px solid transparent;
    }
    .cat-card:hover{transform:translateY(-4px);box-shadow:var(--sh-h);border-color:var(--rose);}
    .cat-emoji{font-size:2.5rem;margin-bottom:.625rem;}
    .cat-name{font-family:var(--fd);font-size:1.05rem;margin-bottom:.2rem;}
    .cat-count{font-size:.78rem;color:var(--text-lt);}
    .recent-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;}
    .recent-item{aspect-ratio:1;border-radius:10px;overflow:hidden;cursor:pointer;box-shadow:var(--sh);position:relative;}

    /* ── CATEGORY / DISH ── */
    .back-btn{
      background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:.4rem;
      color:var(--text-lt);font-family:var(--fb);font-size:.88rem;font-weight:700;
      margin-bottom:1.25rem;transition:var(--tr);
    }
    .back-btn:hover{color:var(--text);}
    .add-dish-btn{
      display:inline-flex;align-items:center;gap:.5rem;
      background:linear-gradient(135deg,var(--rose),var(--peach));border:none;
      border-radius:var(--rs);padding:.65rem 1.25rem;cursor:pointer;
      font-family:var(--fb);font-size:.88rem;font-weight:800;
      color:#fff;transition:var(--tr);margin-bottom:1.5rem;
    }
    .add-dish-btn:hover{transform:translateY(-2px);box-shadow:var(--sh-h);}
    .dishes{display:flex;flex-direction:column;gap:.625rem;}
    .dish-card{
      background:#fff;border-radius:var(--rs);padding:.875rem 1.125rem;
      box-shadow:var(--sh);transition:var(--tr);display:flex;align-items:center;gap:.875rem;
    }
    .dish-card:hover{transform:translateX(4px);box-shadow:var(--sh-h);}
    .dish-chk{
      width:24px;height:24px;border-radius:50%;border:2.5px solid var(--rose);
      background:#fff;display:flex;align-items:center;justify-content:center;
      cursor:pointer;flex-shrink:0;transition:var(--tr);
    }
    .dish-chk.on{background:var(--rose);border-color:var(--rose);}
    .dish-chk.on::after{content:'✓';color:#fff;font-size:12px;font-weight:800;}
    .dish-info{flex:1;cursor:pointer;}
    .dish-name{font-weight:800;font-size:.97rem;}
    .dish-meta{font-size:.77rem;color:var(--text-lt);margin-top:.2rem;}
    .dish-arr{color:var(--text-lt);font-size:1.2rem;cursor:pointer;padding:.25rem;}

    /* ── MEMORIES ── */
    .mem-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.75rem;margin-bottom:1.5rem;}
    .mem-card{
      border-radius:var(--rs);overflow:hidden;box-shadow:var(--sh);
      cursor:pointer;transition:var(--tr);aspect-ratio:1;
      background:var(--cream);position:relative;
    }
    .mem-card:hover{transform:scale(1.025);box-shadow:var(--sh-h);}
    .mem-date{
      position:absolute;bottom:0;left:0;right:0;
      background:linear-gradient(transparent,rgba(0,0,0,.52));
      color:#fff;font-size:.72rem;font-weight:700;padding:1.5rem .625rem .5rem;
    }
    .mem-note-badge{
      position:absolute;top:.4rem;right:.4rem;background:rgba(255,255,255,.9);
      border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:.68rem;
    }

    /* ── TIMELINE ── */
    .tl-masonry{columns:2;column-gap:.75rem;margin-bottom:2rem;}
    @media(min-width:500px){.tl-masonry{columns:3;}}
    .tl-item{
      break-inside:avoid;margin-bottom:.75rem;border-radius:var(--rs);
      overflow:hidden;box-shadow:var(--sh);cursor:pointer;transition:var(--tr);
    }
    .tl-item:hover{transform:scale(1.02);box-shadow:var(--sh-h);}

    .yr-card{background:#fff;border-radius:var(--r);margin-bottom:1rem;box-shadow:var(--sh);overflow:hidden;}
    .yr-hd{display:flex;align-items:center;justify-content:space-between;padding:1.125rem 1.375rem;cursor:pointer;transition:var(--tr);}
    .yr-hd:hover{background:var(--cream);}
    .yr-title{font-family:var(--fd);font-size:1.35rem;}
    .yr-count{font-size:.8rem;color:var(--text-lt);margin-top:.1rem;}
    .yr-toggle{color:var(--text-lt);transition:var(--tr);}
    .yr-card.open .yr-toggle{transform:rotate(180deg);}
    .yr-body{display:none;padding:0 1.125rem 1.125rem;}
    .yr-card.open .yr-body{display:block;}
    .yr-preview{display:grid;grid-template-columns:repeat(4,1fr);gap:.4rem;margin-bottom:.875rem;}
    .yr-preview img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;cursor:pointer;}

    .mo-item{background:var(--cream);border-radius:var(--rs);margin-bottom:.625rem;overflow:hidden;}
    .mo-hd{display:flex;align-items:center;justify-content:space-between;padding:.8rem .875rem;cursor:pointer;}
    .mo-name{font-weight:800;font-size:.92rem;}
    .mo-count{font-size:.77rem;color:var(--text-lt);}
    .mo-body{display:none;padding:0 .875rem .875rem;}
    .mo-item.open .mo-body{display:block;}
    .day-grp{margin-bottom:.875rem;}
    .day-lbl{font-size:.73rem;font-weight:800;color:var(--text-lt);margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.5px;}
    .day-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.35rem;}

    /* ── LAZY IMAGE SYSTEM ── */
    .lazy-wrap {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(110deg, #f0e8e4 30%, #faf0ec 50%, #f0e8e4 70%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    .lazy-wrap.loaded { background: none; animation: none; }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .lazy-img, .lazy-vid {
      width:100%;height:100%;object-fit:cover;display:block;
      opacity:0;transition:opacity .35s ease;
    }
    .lazy-img.visible, .lazy-vid.visible {
      opacity:1;
    }
    /* Video overlay play icon */
    .vid-overlay{
      position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      font-size:1.75rem;pointer-events:none;
      filter:drop-shadow(0 2px 6px rgba(0,0,0,.55));
      transition: transform .2s;
    }
    .recent-item:hover .vid-overlay,
    .mem-card:hover .vid-overlay,
    .tl-item:hover .vid-overlay { transform:translate(-50%,-50%) scale(1.15); }

    /* ── MODALS ── */
    .modal-ov{
      position:fixed;inset:0;background:rgba(0,0,0,.48);
      display:none;align-items:flex-end;justify-content:center;
      z-index:1000;backdrop-filter:blur(4px);
    }
    .modal-ov.active{display:flex;}
    .modal{
      background:#fff;border-radius:var(--r) var(--r) 0 0;
      padding:1.375rem 1.25rem;width:100%;max-width:480px;
      max-height:92vh;overflow-y:auto;
      animation:slideUp .32s cubic-bezier(.4,0,.2,1);
    }
    @keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
    .modal-handle{width:38px;height:4px;background:#eee;border-radius:2px;margin:0 auto 1.25rem;}
    .modal-title{font-family:var(--fd);font-size:1.25rem;margin-bottom:1.375rem;}
    .form-g{margin-bottom:1.125rem;}
    .form-g label{display:block;font-size:.78rem;font-weight:800;margin-bottom:.4rem;color:var(--text-lt);text-transform:uppercase;letter-spacing:.5px;}
    .form-g input,.form-g select,.form-g textarea{
      width:100%;padding:.7rem .875rem;border:2px solid #eee;border-radius:var(--rs);
      font-family:var(--fb);font-size:.93rem;outline:none;transition:var(--tr);background:#fff;
    }
    .form-g input:focus,.form-g select:focus,.form-g textarea:focus{border-color:var(--rose);}
    .form-g textarea{resize:vertical;min-height:72px;}
    .upload-area{
      border:2px dashed var(--rose);border-radius:var(--rs);
      padding:1.75rem 1rem;text-align:center;cursor:pointer;transition:var(--tr);background:var(--cream);
    }
    .upload-area:hover{background:#fff;border-style:solid;}
    .upload-area input{display:none;}
    .upload-icon{font-size:2.25rem;margin-bottom:.625rem;}
    .upload-text{font-weight:700;font-size:.93rem;}
    .upload-hint{font-size:.77rem;color:var(--text-lt);margin-top:.2rem;}
    .prev-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-top:.875rem;}
    .prev-item{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;background:#f0e8e4;}
    .prev-item img,.prev-item video{width:100%;height:100%;object-fit:cover;}
    .prev-rm{
      position:absolute;top:.2rem;right:.2rem;
      background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;
      width:20px;height:20px;font-size:10px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
    }
    .progress{width:100%;height:5px;background:#eee;border-radius:3px;margin-top:.5rem;}
    .progress-bar{height:100%;background:linear-gradient(90deg,var(--rose),var(--peach));border-radius:3px;transition:width .3s;}
    .modal-acts{display:flex;gap:.625rem;margin-top:1.375rem;}
    .btn-sec{
      flex:1;padding:.8rem;background:var(--cream);border:none;border-radius:var(--rs);
      font-family:var(--fb);font-size:.93rem;font-weight:700;color:var(--text-lt);cursor:pointer;transition:var(--tr);
    }
    .btn-sec:hover{background:#eee;}
    .btn-sub{
      flex:2;padding:.8rem;background:linear-gradient(135deg,var(--rose),var(--peach));
      border:none;border-radius:var(--rs);font-family:var(--fb);
      font-size:.93rem;font-weight:800;color:#fff;cursor:pointer;transition:var(--tr);
    }
    .btn-sub:hover{transform:translateY(-2px);box-shadow:var(--sh-h);}
    .btn-sub:disabled{opacity:.55;cursor:not-allowed;transform:none;}

    /* ── LIGHTBOX ── */
    .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;z-index:2000;}
    .lightbox.active{display:flex;}
    .lightbox img,.lightbox video{max-width:96vw;max-height:88vh;border-radius:var(--rs);object-fit:contain;}
    .lb-close{
      position:absolute;top:1rem;right:1rem;background:rgba(255,255,255,.18);
      border:none;color:#fff;width:40px;height:40px;border-radius:50%;
      font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
    }
    .lb-info{position:absolute;bottom:1.5rem;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.7);font-size:.8rem;text-align:center;}
    .lb-arrow{
      position:absolute;top:50%;transform:translateY(-50%);
      background:rgba(255,255,255,.18);border:none;color:#fff;
      width:48px;height:48px;border-radius:50%;font-size:1.8rem;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      transition:background .2s;z-index:10;user-select:none;
    }
    .lb-arrow:hover{background:rgba(255,255,255,.38);}
    #lb-prev{left:.75rem;}
    #lb-next{right:.75rem;}
    .lb-del-btn{
      position:absolute;top:1rem;left:1rem;
      background:rgba(220,50,50,.75);border:none;color:#fff;
      width:40px;height:40px;border-radius:50%;font-size:.95rem;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      transition:background .2s;z-index:10;
    }
    .lb-del-btn:hover{background:rgba(220,50,50,1);}
    .lb-count{
      position:absolute;top:1.05rem;left:50%;transform:translateX(-50%);
      color:rgba(255,255,255,.8);font-size:.85rem;font-weight:700;
      background:rgba(0,0,0,.35);padding:.2rem .7rem;border-radius:20px;
    }
    /* Lightbox loading spinner */
    .lb-spinner{
      position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      width:36px;height:36px;border:3px solid rgba(255,255,255,.2);
      border-top-color:#fff;border-radius:50%;
      animation:spin .7s linear infinite;display:none;
    }
    .lb-spinner.show{display:block;}

    /* ── DELETE BUTTONS ── */
    .mem-del{
      position:absolute;bottom:.4rem;right:.4rem;
      background:rgba(220,50,50,.8);border:none;color:#fff;
      width:28px;height:28px;border-radius:50%;font-size:.7rem;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      opacity:0;transition:opacity .2s;z-index:5;
    }
    .mem-card:hover .mem-del{opacity:1;}
    @media(max-width:600px){.mem-del{opacity:.85;}}
    .dish-del{
      background:none;border:none;color:#e57373;font-size:1.05rem;
      cursor:pointer;padding:.3rem .4rem;flex-shrink:0;transition:var(--tr);
    }
    .dish-del:hover{color:#c62828;transform:scale(1.2);}

    /* ── TOAST ── */
    .toast{
      position:fixed;bottom:5.5rem;left:50%;
      transform:translateX(-50%) translateY(80px);
      background:var(--text);color:#fff;padding:.65rem 1.375rem;
      border-radius:24px;font-size:.88rem;font-weight:700;
      z-index:3000;transition:transform .3s ease;pointer-events:none;
      white-space:nowrap;
    }
    .toast.show{transform:translateX(-50%) translateY(0);}

    /* ── LOADING / EMPTY ── */
    .loading{text-align:center;padding:3rem 1rem;color:var(--text-lt);}
    .spinner{width:30px;height:30px;border:3px solid var(--cream);border-top-color:var(--rose);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 1rem;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .empty{text-align:center;padding:3.5rem 1rem;color:var(--text-lt);}
    .empty p{font-size:2.75rem;margin-bottom:.875rem;}
    .empty h3{font-weight:800;margin-bottom:.4rem;color:var(--text);}

    /* ── SKELETON ── */
    .skel{
      background:linear-gradient(110deg,#f0e8e4 30%,#faf0ec 50%,#f0e8e4 70%);
      background-size:200% 100%;animation:shimmer 1.4s infinite;
      border-radius:var(--rs);
    }

    /* ── ANIMATIONS ── */
    .fi{animation:fadeIn .4s ease forwards;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

    /* Image/video in grids */
    .day-grid img,.day-grid video{
      width:100%;aspect-ratio:1;object-fit:cover;border-radius:7px;cursor:pointer;transition:var(--tr);
    }
    .day-grid img:hover,.day-grid video:hover{opacity:.82;}

    /* ── RESPONSIVE ── */
    @media(min-width:600px){
      .page{padding:2rem 1.5rem 2rem;}
      .cat-grid{grid-template-columns:repeat(4,1fr);}
      .mem-grid{grid-template-columns:repeat(3,1fr);}
      .btm-nav{display:none;}
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-logo">🍜 Ăn cùng nhau</div>
  <nav class="header-nav">
    <button class="nav-btn active" data-pg="home"     onclick="goPage('home')">🏠 Trang chủ</button>
    <button class="nav-btn"        data-pg="timeline" onclick="goPage('timeline')">📷 Timeline</button>
  </nav>
</header>

<div id="p-home"     class="page active"></div>
<div id="p-category" class="page"></div>
<div id="p-dish"     class="page"></div>
<div id="p-timeline" class="page"></div>

<nav class="btm-nav">
  <button class="btm-btn active" data-pg="home"     onclick="goPage('home')"><span>🏠</span><span>Trang chủ</span></button>
  <button class="btm-btn"        data-pg="timeline" onclick="goPage('timeline')"><span>📷</span><span>Timeline</span></button>
  <button class="btm-btn add-btn-c" onclick="openUpload(null)"><span>＋</span><span>Thêm</span></button>
</nav>

<!-- ── MODAL: ADD DISH ── -->
<div class="modal-ov" id="m-dish">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 class="modal-title">🍽️ Thêm món mới</h2>
    <div class="form-g"><label>Tên món ăn</label><input type="text" id="m-dish-name" placeholder="VD: Phở bò, Cơm tấm..."></div>
    <div class="form-g"><label>Danh mục</label><select id="m-dish-cat"></select></div>
    <div class="modal-acts">
      <button class="btn-sec" onclick="closeM('m-dish')">Hủy</button>
      <button class="btn-sub" onclick="submitDish()">Thêm món ✓</button>
    </div>
  </div>
</div>

<!-- ── MODAL: UPLOAD ── -->
<div class="modal-ov" id="m-upload">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 class="modal-title">📸 Thêm kỷ niệm</h2>
    <div id="m-warn" class="info-box" style="display:none;">
      <strong>⚠️ Chế độ Demo</strong>

/* ═══════════════════════════════════════════════
   🖼️  LAZY LOADER — IntersectionObserver
   ═══════════════════════════════════════════════ */
const _lazyIO = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (!entry.isIntersecting) return;
    const el   = entry.target;
    const src  = el.dataset.src;
    if (!src) return;
    _lazyIO.unobserve(el);

    const wrap = el.closest('.lazy-wrap');

    if (el.tagName === 'VIDEO') {
      el.src = src;
      el.load();
      el.addEventListener('loadeddata', () => {
        el.classList.add('visible');
        if (wrap) wrap.classList.add('loaded');
      }, { once: true });
      el.addEventListener('error', () => {
        if (wrap) wrap.classList.add('loaded');
      }, { once: true });
    } else {
      const img = new Image();
      img.onload = () => {
        el.src = src;
        el.classList.add('visible');
        if (wrap) wrap.classList.add('loaded');
      };
      img.onerror = () => {
        // FIX: xóa dataset.src để tránh vòng lặp vô hạn onerror
        delete el.dataset.src;
        el.src = '';
        if (wrap) wrap.classList.add('loaded');
        // Thử refresh Telegram URL 1 lần duy nhất
        const fid = el.dataset.fid;
        if (fid && IS_TG_CONFIGURED) {
          tgRefreshAndLoad(el, wrap, fid);
        }
      };
      img.src = src;
    }
  });
}, { rootMargin: '200px 0px', threshold: 0.01 });

/* Tạo HTML lazy-wrap cho ảnh */
function lazyImg(src, fid = '', cls = '', extra = '') {
  return `<div class="lazy-wrap">
    <img class="lazy-img ${cls}" data-src="${src}" data-fid="${fid}"
         alt="" decoding="async" ${extra}>
  </div>`;
}

/* Tạo HTML lazy-wrap cho video */
function lazyVid(src, cls = '', extra = '') {
  return `<div class="lazy-wrap">
    <video class="lazy-vid ${cls}" data-src="${src}"
           muted playsinline preload="none" ${extra}></video>
    <div class="vid-overlay">▶</div>
  </div>`;
}

/* Đăng ký observer cho tất cả lazy element mới trong container */
function observeLazy(container) {
  container.querySelectorAll('[data-src]').forEach(el => _lazyIO.observe(el));
}

/* ═══════════════════════════════════════════════
   TELEGRAM HELPERS
   ═══════════════════════════════════════════════ */
async function tgUploadFile(file) {
  const isVideo = file.type.startsWith('video');
  const method  = isVideo ? 'sendVideo' : 'sendPhoto';
  const field   = isVideo ? 'video'     : 'photo';
  const form    = new FormData();
  form.append('chat_id', TG_CHAT);
  form.append(field, file);
  form.append('caption', file.name);
  const res  = await fetch(`${TG_API}/${method}`, { method: 'POST', body: form });
  const json = await res.json();
  if (!json.ok) throw new Error(`Telegram: ${json.description}`);
  const msg      = json.result;
  const msgId    = msg.message_id;
  const mediaObj = isVideo ? msg.video : (msg.photo ? msg.photo[msg.photo.length-1] : null);
  if (!mediaObj) throw new Error('Telegram: không tìm thấy media');
  const fileId   = mediaObj.file_id;
  const filePath = await tgGetFilePath(fileId);
  const url      = `${TG_FILE}/${filePath}`;
  return { fileId, filePath, url, type: isVideo ? 'video' : 'image', msgId };
}

async function tgGetFilePath(fileId) {
  const res  = await fetch(`${TG_API}/getFile?file_id=${fileId}`);
  const json = await res.json();
  if (!json.ok) throw new Error(`getFile thất bại: ${json.description}`);
  return json.result.file_path;
}

/* FIX: Refresh và load ảnh 1 lần, không gây vòng lặp */
async function tgRefreshAndLoad(imgEl, wrap, fileId) {
  if (!fileId || !IS_TG_CONFIGURED) return;
  try {
    const fp     = await tgGetFilePath(fileId);
    const newUrl = `${TG_FILE}/${fp}`;

    Object.values(_pools).forEach(pool => {
      pool.forEach(item => {

      const idx = m.tg_file_ids.indexOf(fileId);
      if (idx !== -1 && m.media_urls) m.media_urls[idx] = newUrl;
    });
    // Load ảnh mới (không dùng onerror nữa để tránh loop)
    const tmp = new Image();
    tmp.onload = () => {
      imgEl.src = newUrl;
      imgEl.classList.add('visible');

    };
    tmp.src = newUrl;
  } catch(e) {
    console.warn('tgRefreshAndLoad:', e.message);
    if (wrap) wrap.classList.add('loaded');
  }
}

/* ═══════════════════════════════════════════════
   REALTIME
   ═══════════════════════════════════════════════ */
function startRealtime() {
  if (IS_DEMO) return;
  sbClient.channel('db-changes')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'memories' }, p => {
      if (!S.mems.find(m => m.id === p.new.id)) S.mems.unshift(p.new);
      reRender();
    })
    .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'memories' }, p => {
      S.mems = S.mems.filter(m => m.id !== p.old.id); reRender();
    })
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'dishes' }, p => {
      if (!S.dishes.find(d => d.id === p.new.id)) S.dishes.push(p.new); reRender();
    })
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'dishes' }, p => {
      const idx = S.dishes.findIndex(d => d.id === p.new.id);
      if (idx !== -1) S.dishes[idx] = p.new; reRender();
    })
    .subscribe();
}

      <video class="lazy-vid" data-src="${url}" muted playsinline preload="none"></video>
      <div class="vid-overlay">▶</div>

  }
  return `<div class="lazy-wrap ${wrapCls}">
    <img class="lazy-img" data-src="${url}" data-fid="${fid||''}" alt="" decoding="async">
  </div>`;
}

          <div class="mem-card fi" style="animation-delay:${i*.05}s" onclick="openPool('dish',${i})">
            ${renderMedia(m.media_urls[0], m.media_types?.[0]||'image', m.tg_file_ids?.[0]||'')}
            <div class="mem-date">${fmtDate(m.date)}</div>
            ${m.note ? `<div class="mem-note-badge">💭</div>` : ''}
            <button class="mem-del" onclick="event.stopPropagation();confirmDeleteMem('${m.id}')" title="Xóa kỷ niệm">🗑</button>
          </div>`).join('')}</div>`}
  `;
  afterRender('p-dish');
}

function renderTimeline() {
  if (!S.mems.length) {
    $('p-timeline').innerHTML = `<h1 class="pg-title">📷 <span>Timeline</span></h1>
      <div class="empty"><p>🖼️</p><h3>Chưa có kỷ niệm</h3><p style="font-size:.88rem">Hãy ghi lại bữa ăn đầu tiên!</p></div>`;
    return;
  }

  const sorted = [...S.mems].sort((a,b) => b.date.localeCompare(a.date));
  const grp = {};
  sorted.forEach(m => {
    const [y, mo, d] = m.date.split('-');
    if (!grp[y])      grp[y] = {};
    if (!grp[y][mo])  grp[y][mo] = {};
    if (!grp[y][mo][d]) grp[y][mo][d] = [];
    m.media_urls.forEach((u, i) => grp[y][mo][d].push({
      url: u, type: m.media_types?.[i]||'image',
      date: m.date, fid: m.tg_file_ids?.[i]||'', memId: m.id
    }));
  });

  const allPh  = sorted.flatMap(m => m.media_urls.map((u,i) => ({
    url: u, type: m.media_types?.[i]||'image',
    date: m.date, fid: m.tg_file_ids?.[i]||'', memId: m.id
  }))).slice(0, 24);
  const total  = sorted.reduce((s,m) => s + m.media_urls.length, 0);
  const MO     = ['','Tháng 1','Tháng 2','Tháng 3','Tháng 4','Tháng 5','Tháng 6','Tháng 7','Tháng 8','Tháng 9','Tháng 10','Tháng 11','Tháng 12'];

  setPool('tl', allPh.map(p => ({ url: p.url, type: p.type, info: fmtDate(p.date), memId: p.memId, fid: p.fid })));

  let html = `
    <h1 class="pg-title">📷 <span>Timeline</span></h1>
    <div class="sec-label">🖼️ Tất cả · ${total} tấm ảnh</div>
    <div class="tl-masonry">
      ${allPh.map((p, i) => `
        <div class="tl-item fi" style="animation-delay:${i*.025}s" onclick="openPool('tl',${i})">
          ${renderMedia(p.url, p.type, p.fid)}
        </div>`).join('')}
    </div>
    <div class="sec-label" style="margin-top:.5rem;">📅 Theo năm</div>`;

  Object.keys(grp).sort((a,b) => b-a).forEach(year => {
    const yMems  = sorted.filter(m => m.date.startsWith(year));
    const totalY = yMems.reduce((s,m) => s + m.media_urls.length, 0);
    const prev   = yMems.slice(0, 4).map(m => ({ url: m.media_urls[0], fid: m.tg_file_ids?.[0]||'', memId: m.id }));
    const ypKey  = 'yp_'+year;
    setPool(ypKey, prev.map(p => ({ url: p.url, type: 'image', info: year, memId: p.memId, fid: p.fid })));

    html += `<div class="yr-card" id="yr-${year}">
      <div class="yr-hd" onclick="toggleYr('${year}')">
        <div><div class="yr-title">${year}</div><div class="yr-count">${totalY} tấm · ${yMems.length} kỷ niệm</div></div>
        <div class="yr-toggle">▼</div>
      </div>
      <div class="yr-body">
        ${prev.length ? `<div class="yr-preview">${prev.map((p,i) =>
          `<div class="lazy-wrap" style="aspect-ratio:1;border-radius:8px;overflow:hidden;">
            <img class="lazy-img" data-src="${p.url}" data-fid="${p.fid}" alt="" decoding="async"
                 style="width:100%;height:100%;object-fit:cover;cursor:pointer;"
                 onclick="openPool('${ypKey}',${i})">
          </div>`
        ).join('')}</div>` : ''}`;

    Object.keys(grp[year]).sort((a,b) => b-a).forEach(mo => {
      const moPics = Object.values(grp[year][mo]).flat();
      html += `<div class="mo-item" id="mo-${year}-${mo}">
        <div class="mo-hd" onclick="toggleMo('${year}','${mo}')">
          <div class="mo-name">${MO[parseInt(mo)]}</div>
          <div class="mo-count">${moPics.length} ảnh ▸</div>
        </div>
        <div class="mo-body">`;
      Object.keys(grp[year][mo]).sort((a,b) => b-a).forEach(day => {
        const items  = grp[year][mo][day];
        const poolKey = `day_${year}_${mo}_${day}`;
        setPool(poolKey, items.map(it => ({ url: it.url, type: it.type, info: fmtDate(it.date), memId: it.memId, fid: it.fid })));
        html += `<div class="day-grp">
          <div class="day-lbl">Ngày ${parseInt(day)} tháng ${parseInt(mo)}</div>
          <div class="day-grid">
            ${items.map((it, ji) => `
              <div class="lazy-wrap" style="aspect-ratio:1;border-radius:7px;overflow:hidden;cursor:pointer;" onclick="openPool('${poolKey}',${ji})">
                ${it.type === 'video'
                  ? `<video class="lazy-vid" data-src="${it.url}" muted playsinline preload="none" style="width:100%;height:100%;object-fit:cover;"></video>
                     <div class="vid-overlay" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1.4rem;pointer-events:none;">▶</div>`
                  : `<img class="lazy-img" data-src="${it.url}" data-fid="${it.fid||''}" alt="" decoding="async" style="width:100%;height:100%;object-fit:cover;">`
                }
              </div>`).join('')}
          </div>
        </div>`;
      });
      html += `</div></div>`;
    });
    html += `</div></div>`;
  });

  $('p-timeline').innerHTML = html;
  afterRender('p-timeline');
}

/* ═══════════════════════════════════════════════
   NAVIGATION
   ═══════════════════════════════════════════════ */
function goPage(pg) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('[data-pg]').forEach(b => b.classList.remove('active'));
  $('p-'+pg).classList.add('active');
  document.querySelectorAll(`[data-pg="${pg}"]`).forEach(b => b.classList.add('active'));
  S.page = pg;
  if (pg === 'home')                     renderHome();
  if (pg === 'category' && S.catId)      renderCat(S.catId);
  if (pg === 'dish'     && S.dishId)     renderDish(S.dishId);
  if (pg === 'timeline')                 renderTimeline();
  window.scrollTo(0, 0);
}
function openCat(id)  { S.catId = id; goPage('category'); }
function openDish(id) {
  const d = S.dishes.find(x => x.id === id);
  if (d) S.catId = d.category_id;
  S.dishId = id;
  goPage('dish');
}
function toggleYr(y) { const el = $('yr-'+y); if (el) { el.classList.toggle('open'); observeLazy(el); } }
function toggleMo(y, m) { const el = $(`mo-${y}-${m}`); if (el) { el.classList.toggle('open'); observeLazy(el); } }

/* ═══════════════════════════════════════════════
   MODALS
   ═══════════════════════════════════════════════ */
function openAddDish(catId) {
  $('m-dish-cat').innerHTML = S.cats.map(c =>
    `<option value="${c.id}"${c.id===catId?' selected':''}>${c.emoji} ${c.name}</option>`).join('');
  $('m-dish-name').value = '';
  openM('m-dish');
}
async function submitDish() {
  const name   = $('m-dish-name').value.trim();
  const catId  = $('m-dish-cat').value;
  if (!name) { toast('Vui lòng nhập tên món ăn'); return; }
  await doAddDish(name, catId);
  closeM('m-dish'); toast('✅ Đã thêm: '+name); renderCat(S.catId);
}

function openUpload(dishId) {
  $('m-up-dish').innerHTML = S.dishes.map(d => {
    const c = S.cats.find(x => x.id === d.category_id);
    return `<option value="${d.id}"${d.id===dishId?' selected':''}>${c?.emoji||''} ${d.name}</option>`;
  }).join('');
  $('m-up-date').value = new Date().toISOString().split('T')[0];
  $('m-up-note').value = '';
  $('m-preview').innerHTML = '';
  $('m-prog').style.display = 'none';
  $('prog-bar').style.width = '0%';
  $('m-warn').style.display = IS_DEMO ? 'block' : 'none';
  // FIX: revoke cũ trước khi reset
  _revokeBlobUrls();
  S.files = [];
  openM('m-upload');
}

/* FIX: Revoke blob URLs để tránh memory leak */
function _revokeBlobUrls() {
  S.blobUrls.forEach(u => { try { URL.revokeObjectURL(u); } catch{} });
  S.blobUrls = [];
}

/* FIX: onFiles — không dùng vòng lặp += với S.files để tránh nhân đôi khi re-render */
function onFiles(inp) {
  const newFiles = Array.from(inp.files);
  S.files = [...S.files, ...newFiles];
  _renderFilePreview();
  // Reset input value để có thể chọn lại cùng file
  inp.value = '';
}

function _renderFilePreview() {
  // Revoke URL cũ
  _revokeBlobUrls();
  $('m-preview').innerHTML = S.files.map((f, i) => {
    const u   = URL.createObjectURL(f);
    S.blobUrls.push(u); // Track để revoke sau
    const isV = f.type.startsWith('video');
    return `<div class="prev-item">
      ${isV
        ? `<video src="${u}" muted preload="metadata"></video>`
        : `<img src="${u}" alt="" loading="lazy">`}
      <button class="prev-rm" onclick="rmFile(${i})">✕</button>
    </div>`;
  }).join('');
}

/* FIX: rmFile — chỉ xóa khỏi mảng rồi re-render, không gọi lại onFiles */
function rmFile(i) {
  S.files.splice(i, 1);
  _renderFilePreview();
}

async function submitUpload() {
  const dishId = $('m-up-dish').value;
  const date   = $('m-up-date').value;
  const note   = $('m-up-note').value;
  if (!dishId) { toast('Vui lòng chọn món ăn'); return; }
  if (!date)   { toast('Vui lòng chọn ngày'); return; }
  if (!S.files.length) { toast('Vui lòng chọn ít nhất 1 ảnh/video'); return; }
  const btn = $('m-up-btn');
  btn.disabled = true; btn.textContent = 'Đang lưu...';
  if (!IS_DEMO) $('m-prog').style.display = 'block';
  try {
    await doAddMemory(dishId, date, S.files, note);
    _revokeBlobUrls();
    S.files = [];
    closeM('m-upload');
    toast('💕 Đã lưu kỷ niệm!');
    if (S.page === 'dish'     && S.dishId === dishId) renderDish(dishId);
    if (S.page === 'timeline')  renderTimeline();
    if (S.page === 'home')      renderHome();
  } catch(e) { toast('❌ Lỗi: '+e.message); }
  finally { btn.disabled = false; btn.textContent = 'Lưu kỷ niệm 💕'; }
}

function openM(id)  { $(id).classList.add('active'); }
function closeM(id) { $(id).classList.remove('active'); }
document.querySelectorAll('.modal-ov').forEach(o =>
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('active'); }));

async function onToggle(id, el) {
  const on = await doToggleEaten(id);
  el.classList.toggle('on', on);
  toast(on ? '✅ Đã đánh dấu là đã ăn!' : '⭕ Đã bỏ đánh dấu');
}

/* ═══════════════════════════════════════════════
   LIGHTBOX
   ═══════════════════════════════════════════════ */
const _pools = {};
let   _lb    = { pool: [], idx: 0, touchX: 0 };

function setPool(key, items) { _pools[key] = items; }

function openPool(key, idx) {
  _lb.pool = _pools[key] || [];
  _lb.idx  = Math.max(0, Math.min(idx, _lb.pool.length - 1));
  _renderLB();
  $('lightbox').classList.add('active');
}

function _renderLB() {
  const item = _lb.pool[_lb.idx];
  if (!item) return;
  const img = $('lb-img'), vid = $('lb-vid');
  try { vid.pause(); } catch {}

  // Hiện spinner trong lúc load
  $('lb-spinner').classList.add('show');
  img.style.display = 'none';
  vid.style.display = 'none';

  if (item.type === 'video') {
    vid.src = item.url;
    vid.style.display = 'block';
    vid.onloadeddata = () => $('lb-spinner').classList.remove('show');
    vid.onerror = () => $('lb-spinner').classList.remove('show');
  } else {
    const tmp = new Image();
    tmp.onload = () => {
      img.src = item.url;
      img.style.display = 'block';
      $('lb-spinner').classList.remove('show');
    };
    tmp.onerror = () => {
      $('lb-spinner').classList.remove('show');
      // Thử refresh Telegram 1 lần
      if (item.fid && IS_TG_CONFIGURED) {
        tgGetFilePath(item.fid).then(fp => {
          const newUrl = `${TG_FILE}/${fp}`;
          item.url = newUrl;
          img.src  = newUrl;
          img.style.display = 'block';
        }).catch(() => {});
      }
    };
    tmp.src = item.url;
  }

  $('lb-info').textContent = item.info || '';
  const n    = _lb.pool.length;
  $('lb-count').textContent = n > 1 ? `${_lb.idx+1} / ${n}` : '';
  const show = n > 1 ? 'flex' : 'none';
  $('lb-prev').style.display = show;
  $('lb-next').style.display = show;
  $('lb-del').style.display  = item.memId ? 'flex' : 'none';
}

function navLB(dir) {
  const n = _lb.pool.length;
  if (n <= 1) return;
  _lb.idx = (_lb.idx + dir + n) % n;
  _renderLB();
}

function closeLB() {
  $('lightbox').classList.remove('active');
  try { $('lb-vid').pause(); } catch {}
}

async function deleteLBItem() {
  const item = _lb.pool[_lb.idx];
  if (!item?.memId) return;
  await confirmDeleteMem(item.memId);
  const stillExists = S.mems.find(m => m.id === item.memId);
  if (!stillExists) {
    _lb.pool = _lb.pool.filter(p => p.memId !== item.memId);
    if (_lb.pool.length === 0) { closeLB(); return; }
    _lb.idx = Math.min(_lb.idx, _lb.pool.length - 1);
    _renderLB();
  }
}

document.addEventListener('keydown', e => {
  if (!$('lightbox').classList.contains('active')) return;
  if (e.key === 'Escape')     closeLB();
  if (e.key === 'ArrowLeft')  navLB(-1);
  if (e.key === 'ArrowRight') navLB(1);
});
$('lightbox').addEventListener('click', e => { if (e.target === $('lightbox')) closeLB(); });
$('lightbox').addEventListener('touchstart', e => { _lb.touchX = e.touches[0].clientX; }, { passive: true });
$('lightbox').addEventListener('touchend',   e => {
  const dx = e.changedTouches[0].clientX - _lb.touchX;
  if (Math.abs(dx) > 50) navLB(dx < 0 ? 1 : -1);
});

/* ═══════════════════════════════════════════════
   DELETE
   ═══════════════════════════════════════════════ */
async function confirmDeleteMem(memId) {
  if (!confirm('Xóa kỷ niệm này? Dữ liệu sẽ biến mất vĩnh viễn.')) return;
  await doDeleteMemory(memId);
}

async function doDeleteMemory(memId) {
  const mem = S.mems.find(m => m.id === memId);
  if (!IS_DEMO && mem) {
    const { error } = await sbClient.from('memories').delete().eq('id', memId);
    if (error) { toast('❌ Xóa thất bại: '+error.message); return; }
    if (mem.tg_msg_ids) {
      for (const msgId of mem.tg_msg_ids) await tgDeleteMessage(msgId);
    }
  }
  S.mems = S.mems.filter(m => m.id !== memId);
  toast('🗑️ Đã xóa kỷ niệm');
  reRender();
}

async function doDeleteDish(dishId) {
  const dish      = S.dishes.find(d => d.id === dishId);
  const name      = dish?.name || 'món này';
  const memsToDel = S.mems.filter(m => m.dish_id === dishId);
  const warn      = memsToDel.length ? `\n⚠️ ${memsToDel.length} kỷ niệm liên quan cũng sẽ bị xóa.` : '';
  if (!confirm(`Xóa "${name}"?${warn}`)) return;
  if (!IS_DEMO) {
    const { error } = await sbClient.from('dishes').delete().eq('id', dishId);
    if (error) { toast('❌ Xóa thất bại: '+error.message); return; }
    for (const m of memsToDel) {
      if (m.tg_msg_ids) {
        for (const msgId of m.tg_msg_ids) await tgDeleteMessage(msgId);
      }
    }
  }
  S.dishes = S.dishes.filter(d => d.id !== dishId);
  S.mems   = S.mems.filter(m => m.dish_id !== dishId);
  toast('🗑️ Đã xóa '+name);
  renderCat(S.catId);
}

/* ═══════════════════════════════════════════════
   UTILS
   ═══════════════════════════════════════════════ */
let _tt;
function toast(msg) {
  const el = $('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('show'), 2600);
}
function $(id) { return document.getElementById(id); }
function fmtDate(s) { if (!s) return ''; const [y,m,d] = s.split('-'); return `${d}/${m}/${y}`; }

/* ═══════════════════════════════════════════════
   BOOTSTRAP
   ═══════════════════════════════════════════════ */
(async function boot() {
  $('p-home').innerHTML = '<div class="loading"><div class="spinner"></div><p>Đang tải...</p></div>';
  await loadData();
  startRealtime();
  renderHome();
})();
</script>
