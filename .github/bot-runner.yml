
# Tên của workflow
name: Chạy bot telegram

# Sự kiện kích hoạt workflow: mỗi khi có code được push lên nhánh 'main'
on:
  push:
    branches:
      - main

# Định nghĩa công việc (job) sẽ chạy
jobs:
  run-bot:
    # Chọn môi trường hệ điều hành (ubuntu là phổ biến nhất cho bot)
    runs-on: ubuntu-latest

    # Các bước thực thi trong job
    steps:
      # Bước 1: Lấy code từ repository về máy ảo
      - name: Checkout code
        uses: actions/checkout@v4

      # Bước 2: Thiết lập môi trường Python (thay đổi theo ngôn ngữ bot của bạn)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Bước 3: Cài đặt các thư viện cần thiết (từ file requirements.txt)
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Bước 4: Chạy file bot của bạn
      - name: Run bot
        run: python main.py
        # Truyền biến môi trường từ GitHub Secret vào môi trường chạy
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
